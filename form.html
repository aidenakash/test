<html>
    <head><title>form</title></head>
    <body bgcolor="gray">
        <center><h1>Student form</h1></center>
        First Name:<input type="text" placeholder="First Name">
        <br><br><hr>
        Last Name:<input type="text"placeholder="Last Name">
        <br><br><hr>
        Date of birth:<input type="date">
        <br><br><hr>
        Tel:<input type="text">
        <br><br><hr>
        High School name:<input type="text">
        <br><br><hr>
        Permanent address:<textarea rows=4 cols=18></textarea>
        <br><br><hr>
        Your level<select><option>1st year</option>
        <option>2nd year</option>
        <option>3rd year</option>
        </select>
        <br><br><hr>
        Email:<input type="email"placeholder="Email">
        <br><br><hr>
        Degree program:<select>
            <option>B.Sc cs</option>
            <option>B.Sc IT</option>
            <option>BCA</option>
        </select> <br><br>
        <button>Register</button>
    </body>
</html>
